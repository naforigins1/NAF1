<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAF EXPERIENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #fafafa; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .controls { width: 100%; max-width: 360px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; box-sizing: border-box; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }
        button { background: #1A1A1A; color: white; cursor: pointer; border: none; font-weight: 600; }
        .card-wrapper { width: 360px; height: 600px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); position: relative; }
        #capture-area { width: 100%; height: 100%; padding: 40px 30px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; align-items: center; transition: all 0.2s ease; }
        
        /* الثيمات الافتراضية للكود */
        .theme-classic { background-color: #F4EBD9 !important; color: #1A1A1A !important; }
        .theme-modern { background-color: #1A1A1A !important; color: #F4EBD9 !important; }
        
        .inner-frame { position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px; border: 1px solid currentColor; opacity: 0.15; border-radius: 12px; pointer-events: none; }
        .logo { font-size: 26px; font-weight: 600; margin-top: 10px; }
        .content { text-align: center; }
        .title { font-size: 36px; margin: 0 0 15px 0; font-weight: 600; }
        .wish { font-size: 14px; line-height: 1.8; font-weight: 300; }
        .name-box { width: 85%; border: 1px solid currentColor; padding: 10px; border-radius: 25px; text-align: center; margin-bottom: 15px; background: rgba(255,255,255,0.02); }
        #display-name { font-size: 18px; margin: 0; }
        .footer { font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="text-align:center; margin-top:0; font-size:18px;">NAF Experience</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." maxlength="30">
        <select id="themeSelect">
            <option value="classic">القالب الكلاسيكي (بيج × أسود)</option>
            <option value="modern">القالب المودرن (أسود × بيج)</option>
        </select>
        <button onclick="downloadImage()">تحميل التهنئة ✨</button>
    </div>

    <div class="card-wrapper">
        <div id="capture-area" class="theme-classic">
            <div class="inner-frame"></div>
            <div class="logo">NAF</div>
            <div class="content">
                <h1 class="title">عيدكم مبارك</h1>
                <div class="wish">
                    <span style="font-weight:600; display:block; margin-bottom:5px;">كل عام وأنتم بخير</span>
                    تقبل الله منا ومنكم صالح الأعمال<br>وجعل أيامكم أفراحاً ومسرات
                </div>
            </div>
            <div class="name-box">
                <p id="display-name">الاسم هنا</p>
            </div>
            <div class="footer">NAF Experience</div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const displayName = document.getElementById('display-name');
        const themeSelect = document.getElementById('themeSelect');
        const captureArea = document.getElementById('capture-area');

        nameInput.addEventListener('input', (e) => {
            displayName.innerText = e.target.value || "الاسم هنا";
        });

        // تغيير كلاس الألوان بالكامل لضمان التحديث الفوري وموثوقية المتصفحات
        themeSelect.addEventListener('change', (e) => {
            if(e.target.value === 'modern') {
                captureArea.className = 'theme-modern';
            } else {
                captureArea.className = 'theme-classic';
            }
        });

        function downloadImage() {
            const target = document.querySelector("#capture-area");
            html2canvas(target, { scale: 3, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = NAF_Eid_${nameInput.value.trim() || 'Greeting'}.png;
                link.href = canvas.toDataURL("image/png");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => {
                alert("برجاء المحاولة مرة أخرى أو تصوير الشاشة");
            });
        }
    </script>
</body>
</html>
