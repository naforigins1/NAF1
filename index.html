<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NAF</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:'IBM Plex Sans Arabic',sans-serif;
background:#fafafa;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

.controls{
width:100%;
max-width:360px;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
margin-bottom:20px;
box-sizing:border-box;
}

input,select,button{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
font-family:inherit;
}

button{
background:#1A1A1A;
color:white;
border:none;
font-weight:600;
cursor:pointer;
}

.card-wrapper{
width:360px;
height:600px;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

#capture-area{
width:100%;
height:100%;
padding:40px 30px;
box-sizing:border-box;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
position:relative;
}

.theme-classic{
background:#F4EBD9;
color:#1A1A1A;
}

.theme-modern{
background:#1A1A1A;
color:#F4EBD9;
}

.inner-frame{
position:absolute;
top:15px;
left:15px;
right:15px;
bottom:15px;
border:1px solid currentColor;
opacity:0.15;
border-radius:12px;
}

.logo{
font-size:28px;
font-weight:600;
margin-top:10px;
}

.content{
text-align:center;
}

.title{
font-size:38px;
margin-bottom:15px;
}

.wish{
font-size:15px;
line-height:2;
}

.name-box{
width:85%;
border:1px solid currentColor;
padding:12px;
border-radius:30px;
text-align:center;
}

.footer{
font-size:11px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="controls">

<h2 style="text-align:center;margin-bottom:15px;">
NAF
</h2>

<input
type="text"
id="nameInput"
placeholder="اكتب اسمك هنا..."
>

<select id="themeSelect">

<option value="classic">
القالب الكلاسيكي
</option>

<option value="modern">
القالب المودرن
</option>

</select>

<button onclick="downloadImage()">
تحميل التهنئة ✨
</button>

</div>

<div class="card-wrapper">

<div id="capture-area" class="theme-classic">

<div class="inner-frame"></div>

<div class="logo">
NAF
</div>

<div class="content">

<h1 class="title">
عيدكم مبارك
</h1>

<div class="wish">

<span style="font-weight:600;">
كل عام وأنتم بخير
</span>

<br><br>

تقبل الله منا ومنكم صالح الأعمال

</div>

</div>

<div class="name-box">
<p id="display-name">
الاسم هنا
</p>
</div>

<div class="footer">
NAF
</div>

</div>

</div>

<script>

const nameInput =
document.getElementById('nameInput');

const displayName =
document.getElementById('display-name');

const themeSelect =
document.getElementById('themeSelect');

const captureArea =
document.getElementById('capture-area');


nameInput.addEventListener('input',function(){

displayName.textContent =
nameInput.value || 'الاسم هنا';

});


themeSelect.addEventListener('change',function(){

if(themeSelect.value === 'modern'){

captureArea.classList.remove('theme-classic');

captureArea.classList.add('theme-modern');

}else{

captureArea.classList.remove('theme-modern');

captureArea.classList.add('theme-classic');

}

});


function downloadImage(){

html2canvas(captureArea,{
scale:3
}).then(function(canvas){

const link =
document.createElement('a');

link.download = 'NAF.png';

link.href =
canvas.toDataURL('image/png');

link.click();

});

}

</script>

</body>
</html>
