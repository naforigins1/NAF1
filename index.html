<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAF | معايدة العيد</title>
    
    <!-- خطوط مخصصة تعكس الفخامة والبساطة للهوية -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600&family=Reem+Kufi:wght@500&display=swap" rel="stylesheet">
    
    <!-- مكتبة التقاط الشاشة المحدثة لضمان جودة عالية جداً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            --beige: #F4EBD9;
            --dark: #1A1A1A;
            --border-light: #E2DED5;
        }

        body {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            background-color: #fafafa;
            color: var(--dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* واجهة التحكم */
        .controls {
            width: 100%;
            max-width: 380px;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            z-index: 10;
        }

        h1 { font-weight: 600; font-size: 18px; margin-bottom: 20px; text-align: center; letter-spacing: 1px; }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--dark); }

        .btn-download {
            width: 100%;
            padding: 15px;
            background-color: var(--dark);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 400;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .btn-download:hover { opacity: 0.9; }

        /* منطقة البطاقة - محاكاة لتوزيع بوستر إنتاج */
        .card-wrapper {
            position: relative;
            width: 360px; 
            height: 600px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-radius: 4px;
        }

        /* القالب الكلاسيكي الافتراضي (بيج والخط أسود) */
        #capture-area {
            width: 100%;
            height: 100%;
            background-color: var(--beige);
            color: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 40px 30px;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* إطار داخلي ناعم مثل البوستر المرفق */
        .inner-frame {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid currentColor;
            opacity: 0.15;
            border-radius: 15px;
            pointer-events: none;
        }

        /* الشعار في الأعلى بدون مسافات */
        .brand-logo-top {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0px; 
            margin-top: 10px;
        }

        .main-content {
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* مخطوطة العيد الوسطى */
        .eid-title {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 38px;
            font-weight: 500;
            margin: 0;
            line-height: 1.2;
        }

        .eid-wish {
            font-size: 15px;
            line-height: 1.8;
            font-weight: 300;
            max-width: 90%;
            margin: 0 auto;
        }

        /* خانة الاسم السفلية الأنيقة */
        .name-container {
            width: 85%;
            border: 1px solid currentColor;
            padding: 12px;
            border-radius: 30px; 
            background: rgba(255, 255, 255, 0.05);
            text-align: center;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        #display-name {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer-note {
            font-size: 10px;
            opacity: 0.5;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h1>NAF EXPERIENCE</h1>
        <input type="text" id="nameInput" placeholder="اكتب اسمك ليظهر في البطاقة..." maxlength="30">
        
        <select id="themeSelect">
            <option value="classic">القالب الكلاسيكي (بيج × أسود)</option>
            <option value="modern">القالب المودرن (أسود × بيج)</option>
        </select>

        <button class="btn-download" onclick="downloadImage()">تحميل التهنئة ✨</button>
    </div>

    <!-- منطقة البطاقة المخصصة لـ NAF -->
    <div class="card-wrapper">
        <div id="capture-area">
            <div class="inner-frame"></div>

            <!-- الاسم فوق بدون مسافات -->
            <div class="brand-logo-top">NAF</div>

            <div class="main-content">
                <h2 class="eid-title">عيدكم مبارك</h2>
                
                <div class="eid-wish">
                    <span style="font-weight: 600; font-size: 17px; display: block; margin-bottom: 5px;">كل عام وأنتم بخير</span>
                    تقبل الله منا ومنكم صالح الأعمال<br>
                    وجعل أيامكم أفراحاً ومسرات
                </div>
            </div>

            <!-- حقل الاسم السفلي التفاعلي المصمم بدقة -->
            <div class="name-container">
                <h3 id="display-name">الاسم هنا</h3>
            </div>

            <div class="footer-note">NAF Experience</div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const displayName = document.getElementById('display-name');
        const themeSelect = document.getElementById('themeSelect');
        const captureArea = document.getElementById('capture-area');

        // تحديث الاسم بشكل فوري عند الكتابة
        nameInput.addEventListener('input', (e) => {
            displayName.innerText = e.target.value || "الاسم هنا";
        });

        // التحكم الفوري في الألوان والخطوط (تم تصحيح الخطأ الإملائي هنا)
        themeSelect.addEventListener('change', (e) => {
            if(e.target.value === 'modern') {
                captureArea.style.backgroundColor = "#1A1A1A";
                captureArea.style.color = "#F4EBD9";
            } else {
                captureArea.style.backgroundColor = "#F4EBD9";
                captureArea.style.color = "#1A1A1A";
            }
        });

        // تحسين دالة التحميل وتوافقيتها العالية مع أجهزة الماك والجوالات
        function downloadImage() {
            const btn = document.querySelector('.btn-download');
            btn.innerText = "جاري الحفظ...";
            
            const target = document.querySelector("#capture-area");
            
            html2canvas(target, {
                scale: 3, 
                useCORS: true,
                allowTaint: true,
                backgroundColor: null
            }).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                const userTitle = nameInput.value.trim() || "NAF";
                
                link.download = NAF_Eid_${userTitle}.png;
                link.href = imgData;
                
                // إجبار المتصفح على بدء التحميل الفوري
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                btn.innerText = "تحميل التهنئة ✨";
            }).catch(err => {
                console.error("خطأ أثناء التحميل:", err);
                btn.innerText = "فشل التحميل، جربي ثانية";
            });
        }
    </script>
</body>
</html>
